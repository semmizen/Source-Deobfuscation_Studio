<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deobfuscation Studio</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --primary-color: #238636;
            --primary-hover: #2ea043;
            --accent-color: #1f6feb;
            --danger-color: #da3633;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            color: #ffffff;
        }

        /* Khu vực cấu hình */
        .config-section {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        select, input[type="text"] {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        select {
            cursor: pointer;
        }

        input[type="text"] {
            flex: 1;
            min-width: 200px;
        }

        /* Khu vực Editors */
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
        }

        .box {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 420px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: #7ee787; /* Màu xanh lá kiểu hacker/code */
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            padding: 12px;
            border-radius: 6px;
            resize: vertical;
            outline: none;
        }

        textarea::placeholder {
            color: #484f58;
        }

        /* Nhật ký Console log của Studio */
        .log-section {
            margin-bottom: 20px;
        }
        
        .log-box {
            width: 100%;
            height: 120px;
            background-color: #070a0e;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            color: #58a6ff;
            font-family: monospace;
            font-size: 12px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* Hệ thống nút bấm */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            color: #ffffff;
        }

        .btn-run { background-color: var(--primary-color); }
        .btn-run:hover { background-color: var(--primary-hover); }

        .btn-copy { background-color: var(--accent-color); }
        .btn-copy:hover { background-color: #388bfd; }

        .btn-download { background-color: #21262d; border: 1px solid var(--border-color); color: #c9d1d9;}
        .btn-download:hover { background-color: #30363d; }

        .btn-clear { background-color: var(--danger-color); }
        .btn-clear:hover { background-color: #f85149; }
    </style>
</head>
<body>

<div class="container">
    <h1>Deobfuscation Studio (Lua / Luau)</h1>
    
    <div class="config-section">
        <label for="typeSelect">Loại Code:</label>
        <select id="typeSelect">
            <option value="lua">Lua</option>
            <option value="luau">Luau (Roblox)</option>
        </select>

        <label for="linkInput">Hoặc nhập Link script:</label>
        <input type="text" id="linkInput" placeholder="https://raw.githubusercontent.com/.../script.lua">
    </div>

    <div class="editor-container">
        <div class="box">
            <label for="inputCode">Input Code (Hoặc tự động tải từ link ở trên):</label>
            <textarea id="inputCode" placeholder="Dán đoạn code Lua/Luau đã bị obfuscate vào đây..."></textarea>
        </div>
        <div class="box">
            <label for="outputCode">Kết quả Deobfuscate hoàn chỉnh:</label>
            <textarea id="outputCode" placeholder="Mã nguồn sạch sẽ qua 10 lớp xử lý sẽ xuất hiện ở đây..." readonly></textarea>
        </div>
    </div>

    <div class="log-section">
        <label>Tiến trình giải mã hệ thống (Studio Diagnostics Log):</label>
        <div id="studioLog" class="log-box">Hệ thống đang ở trạng thái chờ lệnh...</div>
    </div>

    <div class="btn-group">
        <button class="btn-run" onclick="runDeobfuscation()">Run Deobfuscation</button>
        <button class="btn-copy" onclick="copyToClipboard()">Copy</button>
        <button class="btn-download" onclick="downloadCode()">Download</button>
        <button class="btn-clear" onclick="clearAll()">Clear</button>
    </div>
</div>

<script>
    // Định nghĩa Object toàn cục giống như thiết kế trong các Layer file từ 1-10
    const DeobfuscationStudio = {
        modules: [],
        registerModule: function(name, executionFunction) {
            this.modules.push({ name: name, run: executionFunction });
            this.log(`[CÀI ĐẶT]: Đã liên kết module "${name}" vào nhân xử lý thành công.`);
        },
        log: function(msg) {
            const logBox = document.getElementById('studioLog');
            logBox.innerText += "\n" + msg;
            logBox.scrollTop = logBox.scrollHeight;
        },
        clearLog: function() {
            document.getElementById('studioLog').innerText = "[HỆ THỐNG]: Bắt đầu tiến trình phân tích...";
        }
    };
</script>

<script>
    // Hàm xử lý chính luồng Pipeline khi bấm nút Run
    async function runDeobfuscation() {
        const type = document.getElementById('typeSelect').value;
        const link = document.getElementById('linkInput').value.trim();
        let currentCode = document.getElementById('inputCode').value;
        const outputTextArea = document.getElementById('outputCode');

        DeobfuscationStudio.clearLog();
        outputTextArea.value = "Hệ thống đang kích hoạt bộ lọc 10 tầng xử lý... Vui lòng đợi...";

        // 1. Tải code từ URL nếu có cấu hình link
        if (link) {
            try {
                DeobfuscationStudio.log(`[TẢI LIỆU]: Đang gửi request lấy dữ liệu từ: ${link}`);
                const response = await fetch(link);
                if (!response.ok) throw new Error("HTTP Status: " + response.status);
                currentCode = await response.text();
                document.getElementById('inputCode').value = currentCode;
                DeobfuscationStudio.log(`[THÀNH CÔNG]: Đã tải xong mã nguồn mục tiêu.`);
            } catch (error) {
                outputTextArea.value = "[LỖI TẢI LINK]: Không thể nạp script từ URL.\nChi tiết: " + error.message;
                DeobfuscationStudio.log(`[LỖI]: Tiến trình nạp URL thất bại.`);
                return;
            }
        }

        if (!currentCode.trim()) {
            outputTextArea.value = "Vui lòng nhập mã nguồn cần xử lý hoặc chèn link Raw GitHub script!";
            DeobfuscationStudio.log(`[CẢNH BÁO]: Input trống.`);
            return;
        }

        // 2. Chạy Pipeline xuyên suốt qua mạng lưới Module đã đăng ký
        setTimeout(async () => {
            try {
                let currentPayload = currentCode;
                
                DeobfuscationStudio.log(`[PIPELINE]: Khởi động chuỗi xử lý gồm ${DeobfuscationStudio.modules.length} modules...`);
                
                // Duyệt qua từng tầng đã được nạp sẵn từ script1.js đến script10.js
                for (let i = 0; i < DeobfuscationStudio.modules.length; i++) {
                    const module = DeobfuscationStudio.modules[i];
                    DeobfuscationStudio.log(`-> Đang xử lý ở Tầng [Layer ${i+1}]: ${module.name}...`);
                    
                    // Thực thi thuật toán của tầng hiện tại và chuyển giao kết quả cho tầng kế tiếp
                    currentPayload = await module.run(currentPayload, type);
                }

                outputTextArea.value = currentPayload;
                DeobfuscationStudio.log(`[HOÀN THÀNH]: Mã nguồn đã được dọn sạch hoàn toàn qua 10 lớp!`);

            } catch (pipelineError) {
                outputTextArea.value = "[LỖI PIPELINE THỰC THI]: " + pipelineError.message;
                DeobfuscationStudio.log(`[LỖI PHÁT SINH]: Cấu trúc mã hóa gây gãy luồng xử lý.`);
            }
        }, 300);
    }

        if (!outputCode || outputCode.
